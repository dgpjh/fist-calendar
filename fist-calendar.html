<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拳头记月法 - 月份天数记忆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'SimSun', serif;
            background: linear-gradient(180deg, #5a7fbc 0%, #3465a4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #ece9d8;
            border: 3px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            padding: 0;
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.5);
            max-width: 900px;
            width: 100%;
        }

        .title-bar {
            background: linear-gradient(180deg, #0997ff 0%, #0053ee 100%);
            padding: 4px 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid #000;
        }

        .title-icon {
            width: 20px;
            height: 20px;
            background: #fff;
            border: 1px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        h1 {
            color: white;
            font-size: 16px;
            font-weight: bold;
            flex: 1;
            text-shadow: 1px 1px 0px rgba(0, 0, 0, 0.5);
        }

        .window-controls {
            display: flex;
            gap: 2px;
        }

        .window-btn {
            width: 16px;
            height: 14px;
            background: #c0c0c0;
            border: 1px solid;
            border-color: #ffffff #000000 #000000 #ffffff;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .content {
            padding: 20px;
        }

        .instruction {
            text-align: center;
            color: #000;
            margin-bottom: 20px;
            font-size: 14px;
            background: #fff;
            padding: 10px;
            border: 2px solid;
            border-color: #808080 #ffffff #ffffff #808080;
        }

        .month-selector {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .month-btn {
            padding: 6px 12px;
            border: 2px solid;
            border-color: #ffffff #000000 #000000 #ffffff;
            background: #c0c0c0;
            color: #000;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            font-family: 'Microsoft YaHei', 'SimSun', serif;
        }

        .month-btn:hover {
            background: #d4d0c8;
        }

        .month-btn:active {
            border-color: #000000 #ffffff #ffffff #000000;
            padding: 7px 11px 5px 13px;
        }

        .month-btn.selected {
            background: #000080;
            color: #ffffff;
            border-color: #000000 #808080 #808080 #000000;
        }

        .fist-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            border: 2px solid;
            border-color: #808080 #ffffff #ffffff #808080;
            background: #fff;
        }

        .fist-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .month-label {
            position: absolute;
            background: #ffffe1;
            padding: 4px 10px;
            font-weight: bold;
            font-size: 13px;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.3);
            transform: translate(-50%, -50%);
            opacity: 0;
            animation: fadeIn 0.3s forwards;
            white-space: nowrap;
            border: 2px solid #000;
            font-family: 'Microsoft YaHei', 'SimSun', serif;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .month-label.big {
            color: #c00000;
        }

        .month-label.small {
            color: #0000c0;
        }

        .month-label.feb {
            color: #c07000;
        }

        .final-display {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(236, 233, 216, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            animation: finalShow 0.5s forwards;
            border: 3px solid #000;
            z-index: 10;
            box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.8);
            animation: finalShow 0.5s forwards, celebrateBorder 1.5s ease-in-out infinite 0.5s;
        }

        .final-month {
            font-size: 48px;
            font-weight: bold;
            color: #000080;
            text-shadow: 2px 2px 0px #808080;
            margin-bottom: 20px;
            font-family: 'Microsoft YaHei', 'SimSun', serif;
            animation: bounce 0.6s ease-out 0.3s;
        }

        .final-days {
            font-size: 72px;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 3px 3px 0px #808080;
            font-family: 'Impact', 'Arial Black', sans-serif;
            animation: scaleIn 0.5s ease-out 0.5s backwards;
        }

        .final-days.big {
            color: #ff0000;
        }

        .final-days.small {
            color: #0000ff;
        }

        .final-days.feb {
            color: #ff8800;
        }

        @keyframes finalShow {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes celebrateBorder {
            0%, 100% {
                box-shadow:
                    0 0 0 0 rgba(255, 215, 0, 0.8),
                    0 0 10px 2px rgba(255, 215, 0, 0.4);
            }
            50% {
                box-shadow:
                    0 0 20px 10px rgba(255, 215, 0, 0.6),
                    0 0 40px 20px rgba(255, 215, 0, 0.2),
                    inset 0 0 20px 5px rgba(255, 215, 0, 0.3);
            }
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
            background: #fff;
            padding: 10px;
            border: 2px solid;
            border-color: #808080 #ffffff #ffffff #808080;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }

        .legend-box {
            width: 16px;
            height: 16px;
            border: 1px solid #000;
        }

        .legend-box.big {
            background: #ff0000;
        }

        .legend-box.small {
            background: #0000ff;
        }

        .legend-box.feb {
            background: #ff8800;
        }

        .reset-btn {
            display: block;
            margin: 20px auto 0;
            padding: 6px 20px;
            background: #c0c0c0;
            color: #000;
            border: 2px solid;
            border-color: #ffffff #000000 #000000 #ffffff;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Microsoft YaHei', 'SimSun', serif;
        }

        .reset-btn:hover {
            background: #d4d0c8;
        }

        .reset-btn:active {
            border-color: #000000 #ffffff #ffffff #000000;
            padding: 7px 19px 5px 21px;
        }

        @media (max-width: 768px) {
            .content {
                padding: 15px;
            }

            h1 {
                font-size: 14px;
            }

            .month-btn {
                padding: 5px 10px;
                font-size: 12px;
            }

            .month-label {
                font-size: 11px;
                padding: 3px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title-bar">
            <div class="title-icon">📅</div>
            <h1>快速识别每个月有几天!</h1>
            <div class="window-controls">
                <div class="window-btn">_</div>
                <div class="window-btn">□</div>
                <div class="window-btn">×</div>
            </div>
        </div>

        <div class="content">
            <div class="instruction">
                现在开始选择你想知道的月份吧!
            </div>

        <div class="month-selector">
            <button class="month-btn" data-month="1">一月</button>
            <button class="month-btn" data-month="2">二月</button>
            <button class="month-btn" data-month="3">三月</button>
            <button class="month-btn" data-month="4">四月</button>
            <button class="month-btn" data-month="5">五月</button>
            <button class="month-btn" data-month="6">六月</button>
            <button class="month-btn" data-month="7">七月</button>
            <button class="month-btn" data-month="8">八月</button>
            <button class="month-btn" data-month="9">九月</button>
            <button class="month-btn" data-month="10">十月</button>
            <button class="month-btn" data-month="11">十一月</button>
            <button class="month-btn" data-month="12">十二月</button>
        </div>

        <div class="fist-container" id="fistContainer">
            <img src="fist.jpg" alt="拳头记月法" class="fist-image" id="fistImage">
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-box big"></div>
                <span>大月(31天)</span>
            </div>
            <div class="legend-item">
                <div class="legend-box small"></div>
                <span>小月(30天)</span>
            </div>
            <div class="legend-item">
                <div class="legend-box feb"></div>
                <span>二月(28/29天)</span>
            </div>
        </div>

        <button class="reset-btn" id="resetBtn">重置</button>
    </div>

    <script>
        const monthData = {
            1: { days: 31, type: 'big', position: { x: 77.1, y: 35.2 } },
            2: { days: 28, type: 'feb', position: { x: 69.6, y: 29.3 } },
            3: { days: 31, type: 'big', position: { x: 62, y: 22.7 } },
            4: { days: 30, type: 'small', position: { x: 55.7, y: 22.5 } },
            5: { days: 31, type: 'big', position: { x: 49.6, y: 17.4 } },
            6: { days: 30, type: 'small', position: { x: 39.9, y: 19.4 } },
            7: { days: 31, type: 'big', position: { x: 30.5, y: 17.2 } },
            8: { days: 31, type: 'big', position: { x: 30.7, y: 17.4 } },
            9: { days: 30, type: 'small', position: { x: 40.4, y: 19 } },
            10: { days: 31, type: 'big', position: { x: 48.9, y: 17.4 } },
            11: { days: 30, type: 'small', position: { x: 56.7, y: 23.3 } },
            12: { days: 31, type: 'big', position: { x: 63.5, y: 24.3 } },
        };

        const monthNames = ['一月', '二月', '三月', '四月', '五月', '六月',
                           '七月', '八月', '九月', '十月', '十一月', '十二月'];

        const typeNames = {
            'big': '大',
            'small': '小',
            'feb': '平'
        };

        const fistContainer = document.getElementById('fistContainer');
        const monthButtons = document.querySelectorAll('.month-btn');
        const resetBtn = document.getElementById('resetBtn');

        let currentSelectedMonth = null;

        let currentPlayback = null;
        let currentAudio = null;

        function clearLabels() {
            const labels = fistContainer.querySelectorAll('.month-label');
            labels.forEach(label => label.remove());
            const finalDisplay = fistContainer.querySelector('.final-display');
            if (finalDisplay) finalDisplay.remove();
        }

        // 使用预生成的童声音频（固定时长版本）
        function playChildVoice(month) {
            return new Promise((resolve) => {
                // 停止当前播放
                if (currentAudio) {
                    currentAudio.pause();
                    currentAudio = null;
                }

                const audio = new Audio(`month-audio/${String(month).padStart(2, '0')}.mp3`);
                currentAudio = audio;
                
                // 极速播放：2.8倍速（再加快40%）
                audio.playbackRate = 2.8;
                
                // 固定时长：不等待音频播放完成，统一300ms后继续
                const fixedDuration = 300; // 每个月份固定300ms
                
                audio.play().catch(err => {
                    console.warn('音频播放失败:', err);
                });
                
                // 固定时长后resolve，不管音频是否播完
                setTimeout(() => {
                    if (currentAudio === audio) {
                        audio.pause();
                        currentAudio = null;
                    }
                    resolve();
                }, fixedDuration);
            });
        }

        function showFinalDisplay(month) {
            const data = monthData[month];
            const finalDiv = document.createElement('div');
            finalDiv.className = 'final-display';

            finalDiv.innerHTML = `
                <div class="final-month">${monthNames[month - 1]}</div>
                <div class="final-days ${data.type}">${data.days}天</div>
            `;

            fistContainer.appendChild(finalDiv);

            // 播放最终语音:"X月有XX天呀!"
            playFinalVoice(month);
        }

        // 播放最终展示语音
        function playFinalVoice(month) {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }

            const audio = new Audio(`month-audio/final-${String(month).padStart(2, '0')}.mp3`);
            currentAudio = audio;

            // 极速播放:2.8倍速(再加快40%)
            audio.playbackRate = 2.8;

            audio.onended = () => {
                currentAudio = null;
            };

            audio.onerror = () => {
                console.warn(`最终语音加载失败: month-audio/final-${String(month).padStart(2, '0')}.mp3`);
                currentAudio = null;
            };

            audio.play().catch(err => {
                console.warn('最终语音播放失败:', err);
                currentAudio = null;
            });
        }

        async function showMonthLabels(targetMonth) {
            clearLabels();

            // 停止之前的播放队列
            if (currentPlayback) {
                clearTimeout(currentPlayback);
            }
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }

            // 先完整轮播所有月份
            for (let month = 1; month <= targetMonth; month++) {
                await new Promise(resolve => {
                    currentPlayback = setTimeout(async () => {
                        // 清除之前的标签,只保留当前月份
                        clearLabels();

                        const data = monthData[month];
                        const label = document.createElement('div');
                        label.className = `month-label ${data.type}`;
                        label.textContent = `${monthNames[month - 1]}${typeNames[data.type]}`;
                        label.style.left = `${data.position.x}%`;
                        label.style.top = `${data.position.y}%`;
                        fistContainer.appendChild(label);

                        // 播放童声音频
                        await playChildVoice(month);

                        resolve();
                    }, (month - 1) * 0.6);
                });
            }

            // 轮播完成后,延迟300ms再显示最终样式
            await new Promise(resolve => setTimeout(resolve, 300));

            // 显示最终大样式
            clearLabels();
            showFinalDisplay(targetMonth);
        }

        monthButtons.forEach(button => {
            button.addEventListener('click', () => {
                const selectedMonth = parseInt(button.dataset.month);

                // 更新按钮选中状态
                monthButtons.forEach(btn => btn.classList.remove('selected'));
                button.classList.add('selected');

                // 显示标注
                currentSelectedMonth = selectedMonth;
                showMonthLabels(selectedMonth);
            });
        });

        resetBtn.addEventListener('click', () => {
            clearLabels();
            monthButtons.forEach(btn => btn.classList.remove('selected'));
            currentSelectedMonth = null;

            // 停止音频播放
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            if (currentPlayback) {
                clearTimeout(currentPlayback);
            }
        });

        // 图片加载完成后调整容器
        document.getElementById('fistImage').addEventListener('load', () => {
            console.log('拳头图片加载完成');
        });

        // 错误处理
        document.getElementById('fistImage').addEventListener('error', () => {
            console.error('拳头图片加载失败,请确保图片路径正确');
            alert('图片加载失败,请确保 fist.jpg 文件存在于同一目录');
        });
    </script>
</body>
</html>
